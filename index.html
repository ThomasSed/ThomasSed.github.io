<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pollen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200');

        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #202124;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: #ffffff;
            padding: 16px 24px;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Google Sans', sans-serif;
            font-size: 22px;
            font-weight: 500;
            margin: 0;
            color: #202124;
        }

        .header .material-symbols-outlined {
            color: #34A853;
            font-size: 28px;
        }

        #container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: start;
        }

        .city-card {
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.2s ease-in-out;
            min-width: 0;
        }

        .city-card:hover {
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }

        .city-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f3f4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .city-title-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-title-group .material-symbols-outlined {
            color: #1a73e8;
        }

        .city-name {
            font-family: 'Google Sans', sans-serif;
            font-size: 20px;
            font-weight: 500;
        }

        .global-quality {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 13px;
            color: #5f6368;
        }

        .table-container {
            padding: 0;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th,
        td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid #f1f3f4;
        }

        th {
            font-weight: 500;
            color: #5f6368;
            background: #f8f9fa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .allergen-name {
            font-weight: 500;
            color: #3c4043;
        }

        .level-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            min-width: 24px;
        }

        .level-0, .level-unknown {
            background-color: #f1f3f4;
            color: #5f6368;
        }

        .level-1 {
            background-color: #e6f4ea;
            color: #137333;
        }

        .level-2 {
            background-color: #fef7e0;
            color: #b06000;
        }

        .level-3 {
            background-color: #fbe9e7;
            color: #d84315;
        }

        .level-4 {
            background-color: #fce8e6;
            color: #c5221f;
        }

        .level-5 {
            background-color: #fad2cf;
            color: #b31412;
        }

        .level-6 {
            background-color: #f3e8fd;
            color: #7b1fa2;
        }

        .empty-dash {
            color: #bdc1c6;
            padding-left: 12px;
        }

        #result {
            margin-top: 8px;
        }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #5f6368;
            padding: 40px;
            font-size: 16px;
        }

        .loading-state .material-symbols-outlined {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #error {
            background: #fce8e6;
            color: #c5221f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
            border: 1px solid #fad2cf;
        }

        @media (min-width: 800px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .city-header {
                padding: 12px 16px;
            }

            th,
            td {
                padding: 12px 16px;
            }

            .header {
                padding: 12px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <span class="material-symbols-outlined">filter_vintage</span>
        <h1>Indice de pollen</h1>
    </div>
    <div id="container">
        <div id="result">
            <!-- Initial content will be populated by JS -->
        </div>
        <div id="error"></div>
    </div>
    <script>
        const levelClass = (value) => {
            if (value === undefined || value === null || value === "-") return "level-chip level-unknown";
            const num = parseInt(value, 10);
            if (isNaN(num)) return "level-chip level-unknown";
            
            if (num === 0) return "level-chip level-0";
            if (num === 1) return "level-chip level-1";
            if (num === 2) return "level-chip level-2";
            if (num === 3) return "level-chip level-3";
            if (num === 4) return "level-chip level-4";
            if (num === 5) return "level-chip level-5";
            if (num >= 6) return "level-chip level-6";
            
            return "level-chip level-unknown";
        };

        const createCitySkeletonHtml = (title) => {
            return `
                <div class="city-card">
                    <div class="city-header">
                        <div class="city-title-group">
                            <span class="material-symbols-outlined" style="color: #dadce0;">location_on</span>
                            <span class="city-name" style="color: #5f6368;">${title}</span>
                        </div>
                        <div class="global-quality">
                            Aujourd'hui
                            <div class="empty-dash" style="margin-top: 6px; display: flex; align-items: center; justify-content: flex-end;">
                                <span class="material-symbols-outlined" style="animation: spin 2s linear infinite; font-size: 16px;">sync</span>
                            </div>
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Allergène</th>
                                    <th>Aujourd'hui</th>
                                    <th>Demain</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="3" style="text-align: center; color: #5f6368; padding: 40px 10px;">
                                        Chargement des données...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        };

        const createCityHtml = (title, todayKey, tomorrowKey, data) => {
            const today = data[todayKey] || {};
            const tomorrow = data[tomorrowKey] || {};

            const allergenKeys = Object.keys(today).filter(k => k !== "qualité globale");
            allergenKeys.sort();

            const formatLabel = (label) => label.charAt(0).toUpperCase() + label.slice(1);

            const getValueHtml = (obj, key) => {
                const val = obj[key];
                if (val === undefined || val === null || val === "-") {
                    return `<span class="empty-dash">-</span>`;
                }
                return `<span class="${levelClass(val)}">${val}</span>`;
            };

            const globalToday = today["qualité globale"];
            const globalHtml = globalToday
                ? `<div class="${levelClass(globalToday)}" style="margin-top: 6px;">Niveau ${globalToday}</div>`
                : `<div class="empty-dash" style="margin-top: 6px;">-</div>`;

            return `
                <div class="city-card">
                    <div class="city-header">
                        <div class="city-title-group">
                            <span class="material-symbols-outlined">location_on</span>
                            <span class="city-name">${title}</span>
                        </div>
                        <div class="global-quality">
                            Aujourd'hui
                            ${globalHtml}
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Allergène</th>
                                    <th>Aujourd'hui</th>
                                    <th>Demain</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${allergenKeys.map(key => `
                                    <tr>
                                        <td class="allergen-name">${formatLabel(key)}</td>
                                        <td>${getValueHtml(today, key)}</td>
                                        <td>${getValueHtml(tomorrow, key)}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        };

        // Render loading skeletons immediately
        document.getElementById("result").innerHTML = `
            <div class="grid">
                ${createCitySkeletonHtml("Nantes")}
                ${createCitySkeletonHtml("Paris")}
            </div>
        `;

        fetch("https://h987gq9iyg.execute-api.eu-north-1.amazonaws.com/pollen-etape/get-pollen")
            .then(r => {
                if (!r.ok) {
                    throw new Error("Erreur lors du chargement des données (" + r.status + ")");
                }
                return r.json();
            })
            .then(data => {
                const result = document.getElementById("result");

                const html = `
                    <div class="grid">
                        ${createCityHtml("Nantes", "date_du_jour_nantes", "date_du_lendemain_nantes", data)}
                        ${createCityHtml("Paris", "date_du_jour_paris", "date_du_lendemain_paris", data)}
                    </div>
                `;

                result.innerHTML = html;
            })
            .catch(err => {
                const errorEl = document.getElementById("error");
                errorEl.style.display = "block";
                errorEl.innerText = err.message || "Impossible de charger les données.";
                document.getElementById("result").innerHTML = "";
            });
    </script>
</body>

</html>
